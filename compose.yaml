
services:
  api:
    build:
      context: .
    ports:
      - 8000:8000
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/cla
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  migrate:
    build:
      context: .
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/cla
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=cla
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cla"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:

