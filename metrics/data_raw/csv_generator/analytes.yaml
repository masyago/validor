analytes:
  # =========================
  # Basic Metabolic Panel
  # =========================
  - panel: "BMP"
    panel_name: "Basic Metabolic Panel"
    test_code: "Na"
    test_name: "Sodium"
    analyte_type: "electrolyte"
    units: "mEq/L"
    reference_range_low: 135
    reference_range_high: 145

  - panel: "BMP"
    panel_name: "Basic Metabolic Panel"
    test_code: "K"
    test_name: "Potassium"
    analyte_type: "electrolyte"
    units: "mEq/L"
    reference_range_low: 3.5
    reference_range_high: 5.1

  - panel: "BMP"
    panel_name: "Basic Metabolic Panel"
    test_code: "Cl"
    test_name: "Chloride"
    analyte_type: "electrolyte"
    units: "mEq/L"
    reference_range_low: 98
    reference_range_high: 107

  - panel: "BMP"
    panel_name: "Basic Metabolic Panel"
    test_code: "HCO3"
    test_name: "Bicarbonate"
    analyte_type: "electrolyte"
    units: "mEq/L"
    reference_range_low: 22
    reference_range_high: 29

  - panel: "BMP"
    panel_name: "Basic Metabolic Panel"
    test_code: "BUN"
    test_name: "Blood Urea Nitrogen"
    analyte_type: "metabolic waste"
    units: "mg/dL"
    reference_range_low: 7
    reference_range_high: 20

  - panel: "BMP"
    panel_name: "Basic Metabolic Panel"
    test_code: "Cr"
    test_name: "Creatinine"
    analyte_type: "metabolic waste"
    units: "mg/dL"
    reference_range_low: 0.6
    reference_range_high: 1.3

  - panel: "BMP"
    panel_name: "Basic Metabolic Panel"
    test_code: "GLU"
    test_name: "Glucose"
    analyte_type: "carbohydrate"
    units: "mg/dL"
    reference_range_low: 70
    reference_range_high: 99

  - panel: "BMP"
    panel_name: "Basic Metabolic Panel"
    test_code: "Ca"
    test_name: "Calcium"
    analyte_type: "electrolyte"
    units: "mg/dL"
    reference_range_low: 8.6
    reference_range_high: 10.2

  # =========================
  # Lipid Panel
  # =========================
  - panel: "LIPID"
    panel_name: "Lipid Panel"
    test_code: "TC"
    test_name: "Total Cholesterol"
    analyte_type: "lipid"
    units: "mg/dL"
    reference_range_low: 0
    reference_range_high: 200

  - panel: "LIPID"
    panel_name: "Lipid Panel"
    test_code: "LDL"
    test_name: "Low-Density Lipoprotein"
    analyte_type: "lipoprotein"
    units: "mg/dL"
    reference_range_low: 0
    reference_range_high: 100

  - panel: "LIPID"
    panel_name: "Lipid Panel"
    test_code: "HDL"
    test_name: "High-Density Lipoprotein"
    analyte_type: "lipoprotein"
    units: "mg/dL"
    reference_range_low: 40
    reference_range_high: 100

  - panel: "LIPID"
    panel_name: "Lipid Panel"
    test_code: "TG"
    test_name: "Triglycerides"
    analyte_type: "lipid"
    units: "mg/dL"
    reference_range_low: 0
    reference_range_high: 150

  # =========================
  # Liver Function Tests
  # =========================
  - panel: "LFT"
    panel_name: "Liver Function Tests"
    test_code: "AST"
    test_name: "Aspartate Aminotransferase"
    analyte_type: "enzyme"
    units: "U/L"
    reference_range_low: 10
    reference_range_high: 40

  - panel: "LFT"
    panel_name: "Liver Function Tests"
    test_code: "ALT"
    test_name: "Alanine Aminotransferase"
    analyte_type: "enzyme"
    units: "U/L"
    reference_range_low: 7
    reference_range_high: 56

  - panel: "LFT"
    panel_name: "Liver Function Tests"
    test_code: "ALP"
    test_name: "Alkaline Phosphatase"
    analyte_type: "enzyme"
    units: "U/L"
    reference_range_low: 44
    reference_range_high: 147

  - panel: "LFT"
    panel_name: "Liver Function Tests"
    test_code: "TP"
    test_name: "Total Protein"
    analyte_type: "protein"
    units: "g/dL"
    reference_range_low: 6.0
    reference_range_high: 8.3

  - panel: "LFT"
    panel_name: "Liver Function Tests"
    test_code: "ALB"
    test_name: "Albumin"
    analyte_type: "protein"
    units: "g/dL"
    reference_range_low: 3.5
    reference_range_high: 5.0

  - panel: "LFT"
    panel_name: "Liver Function Tests"
    test_code: "TBIL"
    test_name: "Total Bilirubin"
    analyte_type: "bile pigment"
    units: "mg/dL"
    reference_range_low: 0.1
    reference_range_high: 1.2
